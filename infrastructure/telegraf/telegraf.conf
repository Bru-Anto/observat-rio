 ''' 
 Serviço do Telegraf
 Ele faz a consulta dos HTTPs do simulador e transforma em respostas métricas para melhor leitura no InfluxDB
 Ele é a ponte entre os simulador e o restante do sistema
 '''

[agent] # Começa a configuração global do Telegraf
  interval = "2s" # Coleta a cada 2 segundos
  round_interval = true # Deixa em tempos redondos
  metric_batch_size = 1000 # Envia as métricas em lotes de 1000
  metric_buffer_limit = 10000 # Gaurda até 10000 métricas caso o destino falhe
  collection_jitter = "0s" # Sem atraso na coleta
  flush_interval = "2s" # Envia os dados a cada 2 segundos 
  flush_jitter = "0s" # Sem atraso no envio 
  hostname = "telegraf" # Define o host como telegraf
  omit_hostname = true # Remove o hostname das métricas que vão ser enviadas

# Começa a consultar o simulador

# HTTPs da Estação Metereológica 

[[inputs.http]]  
  name_override = "wind" # HTTP do vento
  urls = ["http://alpaca_sim/api/v1/observingconditions/0/windspeed"] # Consulta o endpoint do vento no simulador 
  method = "GET" # Pega os dados
  timeout = "2s" # Tempo de 2 segundos 
  headers = { Accept = "application/json" } # Pede resposta JSON
  data_format = "json" # Interpreta a resposta como JSON
  tagexclude = ["url"] # Remove o URL

[[inputs.http]]
  name_override = "rain" # HTTP da chuva
  urls = ["http://alpaca_sim/api/v1/observingconditions/0/rainrate"]  # Consulta o endpoint da chuva no simulador
  method = "GET" 
  timeout = "2s" 
  headers = { Accept = "application/json" } 
  data_format = "json"
  tagexclude = ["url"] 

[[inputs.http]]
  name_override = "humidity" # HTTP da umidade
  urls = ["http://alpaca_sim/api/v1/observingconditions/0/humidity"] # Consulta o endpoint da umidade no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json"
  tagexclude = ["url"] 

[[inputs.http]]
  name_override = "cloudcover" # HTTP da cobertura de nuvens
  urls = ["http://alpaca_sim/api/v1/observingconditions/0/cloudcover"] # Consulta o endpoint da cobertura de nuvens no simulador
  method = "GET" 
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json" 
  tagexclude = ["url"] 

[[inputs.http]] 
  name_override = "skytemperature" # HTTP da temperatura do céu
  urls = ["http://alpaca_sim/api/v1/observingconditions/0/skytemperature"] # Consulta o endpoint da temperatura do céu no simulador
  method = "GET" 
  timeout = "2s" 
  headers = { Accept = "application/json" }
  data_format = "json" 
  tagexclude = ["url"] 

# HTTPs da Câmera

[[inputs.http]]
  name_override = "temperature" # HTTP da temperatura do CCD da câmera
  urls = ["http://alpaca_sim/api/v1/camera/0/ccdtemperature"] # Consulta o endpoint da temperatura do CCD no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json"
  tagexclude = ["url"]

[[inputs.http]]
  name_override = "coolerpower" # HTTP da potência do cooler da câmera
  urls = ["http://alpaca_sim/api/v1/camera/0/coolerpower"]# Consulta o endpoint da potência do cooler no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json"
  tagexclude = ["url"]

[[inputs.http]]
  name_override = "cooleron" # HTTP do cooler ligado/desligado
  urls = ["http://alpaca_sim/api/v1/camera/0/cooleron"] # Consulta o endpoint do cooler ligado/desligado no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json_v2" # Usa o v2 porque é booleano
  tagexclude = ["url"]

  [[inputs.http.json_v2]] # Configuração do JSON V2
    measurement_name = "cooleron" # Nome da medição 

    [[inputs.http.json_v2.field]]
      path = "Value" # Pega do value do simulador 
      rename = "Value" # Mantém o nome
      type = "bool" # Define como booleano

[[inputs.http]]
  name_override = "camerastate" # HTTP do estado da câmera
  urls = ["http://alpaca_sim/api/v1/camera/0/camerastate"] # Consulta o endpoint do estado da câmera no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json"
  tagexclude = ["url"]

# HTTPs do Domo

[[inputs.http]]
  name_override = "dome_shutterstatus" # HTTP do estado de abertura do domo
  urls = ["http://alpaca_sim/api/v1/dome/0/shutterstatus"] # Consulta o endpoint do estado de abertura do domo no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json"
  tagexclude = ["url"]

[[inputs.http]]
  name_override = "dome_azimuth"  # HTTP da posição angular do domo 
  urls = ["http://alpaca_sim/api/v1/dome/0/azimuth"] # Consulta o endpoint da posição angular do domo no simulador
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json"
  tagexclude = ["url"]

[[inputs.http]]
  name_override = "dome_slewing"
  urls = ["http://alpaca_sim/api/v1/dome/0/slewing"]
  method = "GET"
  timeout = "2s"
  headers = { Accept = "application/json" }
  data_format = "json_v2" # Usa o v2 porque é booleano
  tagexclude = ["url"]

  [[inputs.http.json_v2]] 
    measurement_name = "dome_slewing"

    [[inputs.http.json_v2.field]]
      path = "Value"
      rename = "Value"
      type = "bool"

# Outputs para o MQTT

[[outputs.mqtt]]
  servers = ["tcp://mosquitto:1883"] # Define o broker MQTT
  topic = "observatory/telemetry/wind" # Tópico onde a métrica vai ser publicada -> wind
  namepass = ["wind"] # Filtra somente as métricas do wind
  qos = 1 # Entrega apenas uma vez
  retain = false # Não retem a última mensagem 
  data_format = "json" # Publica em JSON
  json_timestamp_units = "1s" # Usa o timestamp em segundos 

[[outputs.mqtt]]
  servers = ["tcp://mosquitto:1883"] # Usa o mesmo broker
  topic = "observatory/telemetry/rain" # Tópico onde a métrica vai ser publicada -> rain
