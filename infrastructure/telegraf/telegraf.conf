# Outputs para o InfluxDB

[[outputs.influxdb_v2]] # Saída para o InfluxDB versão 2
  urls = ["http://influxdb:8086"] # Aponta para a porta do Influx que é a 8086
  token = "$INFLUXDB_TOKEN" # Usa a variável do Token 
  organization = "$INFLUXDB_ORG" # Usa a variável da organização 
  bucket = "$INFLUXDB_BUCKET" # Usa a variável do bucket 
  # Essa variáveis são definadas em um .env -> elas apontam para o seu próprio ambiente do InfluxDB
